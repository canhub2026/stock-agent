name: Victor Kane -- Daily Stock Report

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      extra_tickers:
        description: "Extra tickers (comma-separated)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance --quiet --break-system-packages

      - name: Run Victor Kane analysis
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          PERSONAL_WATCHLIST: ${{ vars.PERSONAL_WATCHLIST }}
          EXTRA_TICKERS:      ${{ github.event.inputs.extra_tickers }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python src/analyze.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
