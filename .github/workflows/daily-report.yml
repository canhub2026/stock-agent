name: Victor Kane — Daily Stock Report

on:
  # ── Automatic daily schedule ────────────────────────────────────────────────
  # 7:00 AM Eastern Time
  # EDT (summer, Mar–Nov): UTC-4  → 11:00 UTC
  # EST (winter, Nov–Mar): UTC-5  → 12:00 UTC
  # Running at 11:00 UTC covers EDT (exact) and is 1hr early for EST — fine for pre-market
  schedule:
    - cron: "0 11 * * 1-5"   # Mon–Fri, 11:00 UTC = 7:00 AM EDT

  # ── Manual trigger with optional extra tickers ──────────────────────────────
  # Go to: Repo → Actions → Victor Kane — Daily Stock Report → Run workflow
  # You can type extra tickers in the input field below
  workflow_dispatch:
    inputs:
      extra_tickers:
        description: "Extra tickers to analyse (comma-separated, e.g. TSLA, AMZN, SOFI)"
        required: false
        default: ""
      note:
        description: "Optional note (shown in logs, e.g. 'checking earnings plays')"
        required: false
        default: ""

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log run info
        run: |
          echo "======================================"
          echo "  Victor Kane Stock Agent"
          echo "  Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "  Extra tickers: ${{ github.event.inputs.extra_tickers }}"
            echo "  Note: ${{ github.event.inputs.note }}"
          fi
          echo "======================================"

      - name: Run Victor Kane analysis
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          PERSONAL_WATCHLIST: ${{ vars.PERSONAL_WATCHLIST }}
          EXTRA_TICKERS:      ${{ github.event.inputs.extra_tickers }}
        run: python src/analyze.py
