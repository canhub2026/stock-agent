name: Victor Kane -- Daily Stock Report

on:
  schedule:
    - cron: "0 11 * * 1-5"   # Mon-Fri 7:00 AM EDT
  workflow_dispatch:
    inputs:
      extra_tickers:
        description: "Extra tickers (comma-separated)"
        required: false
        default: ""
      note:
        description: "Optional note"
        required: false
        default: ""

permissions:
  contents: write   # needed to push index.html to docs/

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log run info
        run: |
          echo "=============================="
          echo "  Victor Kane Stock Agent"
          echo "  Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  Trigger: ${{ github.event_name }}"
          echo "=============================="

      - name: Install dependencies
        run: pip install yfinance --quiet --break-system-packages

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          PERSONAL_WATCHLIST: ${{ vars.PERSONAL_WATCHLIST }}
          EXTRA_TICKERS:      ${{ github.event.inputs.extra_tickers }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python src/analyze.py
